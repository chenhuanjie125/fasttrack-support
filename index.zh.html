<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FastTrack for macOS</title>
  <link rel="icon" href="./assets/app-icon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="site-shell site-shell-home">
    <header class="site-header home-header">
      <a class="brand" href="./index.zh.html" aria-label="FastTrack 首页">
        <img class="brand-icon" src="./assets/app-icon.png" alt="FastTrack 应用图标">
        <div class="brand-copy">
          <strong>FastTrack for macOS</strong>
          <span>快速翻译与本地剪切板工作流</span>
        </div>
      </a>

      <div class="header-search" aria-hidden="true">
        <span>搜索</span>
        <kbd>⌘K</kbd>
      </div>

      <nav class="site-nav" aria-label="Primary">
        <a href="./support.zh.html">支持页</a>
        <a href="./privacy.zh.html">隐私页</a>
        <a href="./index.html">English</a>
      </nav>
    </header>

    <section class="home-hero">
      <div class="home-copy">
        <p class="home-label">FastTrack</p>
        <h1>翻译与剪切板管理工具</h1>
        <p class="home-summary">
          快速翻译选中的文本，整理复制的文本与图片，并从菜单栏即时粘贴所需内容，让常用操作更轻、更快。
        </p>
        <div class="home-actions">
          <a class="button button-primary" href="./support.zh.html">快速上手</a>
          <a class="button button-secondary" href="./privacy.zh.html">隐私政策</a>
        </div>
      </div>

      <div class="hero-art" aria-hidden="true">
        <div class="hero-art-glow"></div>
        <img class="hero-art-icon" src="./assets/app-icon.png" alt="">
      </div>
    </section>

    <section class="feature-grid" aria-label="主要功能">
      <article class="feature-card">
        <h2>翻译</h2>
        <p>从菜单栏或快捷键快速发起选区翻译，不打断当前工作流程。</p>
      </article>
      <article class="feature-card">
        <h2>剪切板</h2>
        <p>本地管理复制过的文本和图片，支持历史记录、锁定位和快速粘贴。</p>
      </article>
      <article class="feature-card">
        <h2>本地优先</h2>
        <p>选中文本、剪切板历史和翻译历史默认仅保存在您的 Mac 本地设备上。</p>
      </article>
      <article class="feature-card">
        <h2>公开文档</h2>
        <p>支持页和隐私页提供权限说明、购买恢复、自助排障和上架合规说明。</p>
      </article>
    </section>
  </main>
</body>
</html>
